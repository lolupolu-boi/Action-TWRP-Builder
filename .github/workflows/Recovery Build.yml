name: Ultimate Bulletproof TWRP Builder

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git"
  MANIFEST_BRANCH: "twrp-9.0"
  DEVICE_NAME: "achilles6_row_call"
  MAKEFILE_NAME: "omni_achilles6_row_call"
  TARGET: "recoveryimage"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Maximize Storage & Strip Cloud Bloat
      run: |
        echo "=== Aggressively freeing up server space ==="
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/share/boost
        sudo docker image prune --all --force

    - name: Setup Compiler Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
          twrp-workspace/.repo
        key: twrp-build-cache-${{ env.DEVICE_NAME }}-${{ github.run_id }}
        restore-keys: |
          twrp-build-cache-${{ env.DEVICE_NAME }}-

    - name: Force Environment to Native Python 2
      run: |
        echo "=== Clearing package manager blocks ==="
        sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock /var/cache/apt/archives/lock
        sudo dpkg --configure -a
        
        echo "=== Injecting Python 2 repository ==="
        sudo add-apt-repository universe -y
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends python2 python2-dev
        
        echo "=== Hardlinking python executable command ==="
        sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 1
        python --version

    - name: Install Main Compilation Frameworks
      run: |
        sudo apt-get install -y --no-install-recommends \
          build-essential git-core gnupg flex bison gperf zip curl zlib1g-dev \
          x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc \
          unzip bc cpio lzop texinfo rsync libncurses5 ccache

    - name: Setup Google Repo Tool Configuration
      run: |
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
        
        git config --global user.name "aayus"
        git config --global user.email "aayus@example.com"
        git config --global color.ui false

    - name: Initialize TWRP Source Core
      run: |
        mkdir -p twrp-workspace
        cd twrp-workspace
        if [ ! -d ".repo" ]; then
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
        fi

    - name: Smart Code Tree Synchronization
      run: |
        cd twrp-workspace
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Nested Zip Device Tree Extractor & Argument Fix
      run: |
        echo "=== Processing custom configurations archive ==="
        mkdir -p temp_unzip
        unzip -q achilles6_row_call.zip -d temp_unzip/
        
        CONFIG_PATH=$(find temp_unzip -name "BoardConfig.mk" | head -n 1)
        if [ -z "$CONFIG_PATH" ]; then
          echo "ERROR: BoardConfig.mk was not found inside the zip!"
          exit 1
        fi
        
        TRUE_TREE_DIR=$(dirname "$CONFIG_PATH")
        echo "True configurations directory verified at: $TRUE_TREE_DIR"
        
        echo "=== Fixing Android 10 bootimg argument mismatch ==="
        # Changes --dtb parameter to --dt so the built-in packaging utility processes it smoothly
        sed -i 's/--dtb/--dt/g' "$TRUE_TREE_DIR/BoardConfig.mk"
        
        mkdir -p twrp-workspace/device/lenovo/${{ env.DEVICE_NAME }}
        cp -r "$TRUE_TREE_DIR"/* twrp-workspace/device/lenovo/${{ env.DEVICE_NAME }}/

    - name: Execute Android Compiler (mka)
      run: |
        cd twrp-workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache
        ccache -M 5G
        
        source build/envsetup.sh
        lunch ${{ env.MAKEFILE_NAME }}-eng
        mka ${{ env.TARGET }} -j$(nproc --all)

    - name: Upload Finished Recovery Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-compiled-image
        path: twrp-workspace/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
        if-no-files-found: error
