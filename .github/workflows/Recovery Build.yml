name: Ultimate Bulletproof TWRP Builder

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git"
  MANIFEST_BRANCH: "twrp-9.0"
  DEVICE_NAME: "achilles6_row_call"
  MAKEFILE_NAME: "omni_achilles6_row_call"
  TARGET: "recoveryimage"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Deep Clean & Maximize Storage Natively
      run: |
        echo "=== Clearing unwanted system runtimes ==="
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift
        sudo docker image prune --all --force

    - name: Force Environment to Native Python 2
      run: |
        echo "=== Clearing existing package tool locks ==="
        sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock /var/cache/apt/archives/lock
        sudo dpkg --configure -a
        
        echo "=== Attaching Universe package source ==="
        sudo add-apt-repository universe
        sudo apt-get update
        
        echo "=== Installing full Python 2.7 environment ==="
        sudo apt-get install -y --no-install-recommends python2 python2-dev
        
        echo "=== Mapping system paths directly to Python 2 ==="
        sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 1
        python --version

    - name: Install Critical Build Utilities
      run: |
        sudo apt-get install -y --no-install-recommends \
          build-essential git-core gnupg flex bison gperf zip curl zlib1g-dev \
          x11proto-core-dev libx11-dev libgl1-mesa-dev libxml2-utils xsltproc \
          unzip bc cpio lzop texinfo rsync libncurses5

    - name: Install and Configure Google Repo Tool
      run: |
        echo "=== Setting up repo environment ==="
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
        
        git config --global user.name "aayus"
        git config --global user.email "aayus@example.com"
        git config --global color.ui false

    - name: Initialize TWRP Build Tree Source
      run: |
        mkdir twrp-workspace
        cd twrp-workspace
        repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}

    - name: Sync Source Code (Smart Sync)
      run: |
        cd twrp-workspace
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Safe Deep-Unpack Device Tree (Nested Folders Bypass)
      run: |
        echo "=== Extracting custom device configurations ==="
        mkdir -p temp_unzip
        unzip -q achilles6_row_call.zip -d temp_unzip/
        
        echo "=== Searching inside nested directories for core definitions ==="
        CONFIG_PATH=$(find temp_unzip -name "BoardConfig.mk" | head -n 1)
        if [ -z "$CONFIG_PATH" ]; then
          echo "ERROR: BoardConfig.mk was not discovered inside your zip package!"
          exit 1
        fi
        
        TRUE_TREE_DIR=$(dirname "$CONFIG_PATH")
        echo "Located internal source tree directory at: $TRUE_TREE_DIR"
        
        echo "=== Allocating configs to target workspace directory ==="
        mkdir -p twrp-workspace/device/lenovo/${{ env.DEVICE_NAME }}
        cp -r "$TRUE_TREE_DIR"/* twrp-workspace/device/lenovo/${{ env.DEVICE_NAME }}/

    - name: Upgrade Packaging Tool to Android 10 (Header V2 Support)
      run: |
        echo "=== Fetching official Android 10 mkbootimg engine ==="
        curl -sL "https://raw.githubusercontent.com/aosp-mirror/platform_system_tools_mkbootimg/android-10.0.0_r47/mkbootimg.py" -o mkbootimg_android10.py
        
        echo "=== Injecting upgraded script into the compiler paths ==="
        # Locates and swaps the old tool script out for the modern version natively
        TARGET_BIN=$(find twrp-workspace -name "mkbootimg" -type f | grep -v "out/")
        for file in $TARGET_BIN; do
          cp mkbootimg_android10.py "$file"
          chmod a+x "$file"
          echo "Successfully patched: $file"
        done

    - name: Execute Android Compiler (mka)
      run: |
        cd twrp-workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        source build/envsetup.sh
        lunch ${{ env.MAKEFILE_NAME }}-eng
        mka ${{ env.TARGET }} -j$(nproc --all)

    - name: Verify and Upload Compiled Recovery Image
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: twrp-compiled-image
        path: twrp-workspace/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
        if-no-files-found: error
