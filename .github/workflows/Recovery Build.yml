name: Build TWRP Recovery via Zip Method

on:
  workflow_dispatch:

env:
  MANIFEST_URL: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git"
  MANIFEST_BRANCH: "twrp-9.0"
  DEVICE_NAME: "achilles6_row_call"
  MAKEFILE_NAME: "omni_achilles6_row_call"
  TARGET: "recoveryimage"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Free Up Disk Space Natively
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc cpio textinfo

    - name: Set Up Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Manifest
      run: |
        mkdir twrp-workspace
        cd twrp-workspace
        git config --global user.name "aayus"
        git config --global user.email "aayus@example.com"
        repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}

    - name: Sync Source Code
      run: |
        cd twrp-workspace
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Unpack Nested Local Device Tree Zip
      run: |
        sudo apt-get install -y unzip
        mkdir -p temp_unzip
        unzip achilles6_row_call.zip -d temp_unzip/
        mkdir -p twrp-workspace/device/lenovo/
        cp -r temp_unzip/achilles6_row_call twrp-workspace/device/lenovo/${{ env.DEVICE_NAME }}

    - name: Build TWRP
      run: |
        cd twrp-workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch ${{ env.MAKEFILE_NAME }}-eng
        mka ${{ env.TARGET }} -j$(nproc --all)

    - name: Upload Compiled Recovery
      uses: actions/upload-artifact@v4
      with:
        name: twrp-compiled-image
        path: twrp-workspace/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
